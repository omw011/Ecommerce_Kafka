<source>
  @type http
  port 9880
  bind 0.0.0.0
  body_size_limit 32m
  keepalive_timeout 10s
</source>

<match kafka.logs>
  @type kafka2
  brokers kafka1:9092,kafka2:9092,kafka3:9092
  default_topic "START_TOPIC"

  <buffer>
    @type memory
    flush_interval 1s
    chunk_limit_size 1m
    retry_max_times 1
    retry_wait 2s
    retry_type exponential_backoff
  </buffer>

  <format>
    @type json
  </format>
</match>